<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>FrameTrail E2E Fixture</title>
    <style>
      * { box-sizing: border-box; }
      html { background: #f5f5f4; color: #1c1917; font-family: Arial, sans-serif; }
      body { min-height: 1500px; margin: 0; padding: 40px; }
      main { width: 760px; border: 1px solid #d6d3d1; background: #fff; padding: 28px; }
      h1 { margin: 0 0 24px; font-size: 30px; }
      .plain-card { width: 420px; margin-bottom: 20px; background: #eef2ff; padding: 14px; }
      #plain-text { display: inline; font-size: 16px; line-height: 24px; }
      .controls { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
      button { min-height: 40px; padding: 8px 16px; }
      #visual-container { width: 360px; margin-bottom: 24px; border: 1px dashed #a8a29e; padding: 18px; }
      #fixture-svg { display: block; width: 180px; height: 70px; margin-bottom: 24px; background: #f0fdf4; }
      #fixture-canvas { display: block; width: 220px; height: 80px; margin-bottom: 24px; background: #fefce8; }
      iframe { display: block; width: 620px; height: 300px; margin-bottom: 20px; border: 8px solid #d6d3d1; }
      #below-fold { margin-top: 700px; padding: 20px; background: #ecfccb; }
    </style>
  </head>
  <body>
    <main>
      <h1 id="heading">FrameTrail 元素測試</h1>
      <div id="plain-card" class="plain-card">
        <span id="plain-text">這是一段不可點擊的純文字</span>
      </div>
      <div class="controls">
        <button id="action-button" type="button"><span>執行操作</span></button>
        <button id="disabled-button" type="button" disabled>停用操作</button>
      </div>
      <div id="visual-container"><strong>一般視覺容器</strong></div>
      <svg id="fixture-svg" role="img" aria-label="流程圖示" viewBox="0 0 180 70">
        <rect x="12" y="12" width="60" height="44" rx="6" fill="#86efac"></rect>
        <circle cx="132" cy="34" r="22" fill="#4ade80"></circle>
      </svg>
      <canvas id="fixture-canvas" width="220" height="80" aria-label="趨勢圖"></canvas>
      <iframe id="cross-origin-frame" title="跨來源測試框架" src="http://localhost:4175/frame.html"></iframe>
      <iframe
        id="sandbox-frame"
        title="受限框架"
        sandbox
        srcdoc="<!doctype html><html><body style='margin:0;padding:24px'><p id='sandbox-text'>sandbox 純文字</p></body></html>"
      ></iframe>
    </main>
    <div id="below-fold">頁面下方內容</div>
    <script>
      window.fixtureState = { actionClicks: 0 };
      document.querySelector('#action-button').addEventListener('click', () => {
        window.fixtureState.actionClicks += 1;
      });
      const canvas = document.querySelector('#fixture-canvas');
      const context = canvas.getContext('2d');
      context.strokeStyle = '#65a30d';
      context.lineWidth = 4;
      context.beginPath();
      context.moveTo(16, 58);
      context.lineTo(78, 30);
      context.lineTo(138, 44);
      context.lineTo(204, 14);
      context.stroke();
    </script>
  </body>
</html>
